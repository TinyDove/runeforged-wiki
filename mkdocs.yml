site_name: Runeforged Wiki
site_description: Runeforged player wiki, mechanics, and data reference
site_url: https://tinydove.github.io/runeforged-wiki/
repo_url: https://github.com/TinyDove/runeforged-wiki
repo_name: TinyDove/runeforged-wiki
docs_dir: wiki
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: slate
      primary: deep purple
      accent: orange

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      reconfigure_search: true
      fallback_to_default: false
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 简体中文
          build: true
          site_name: Runeforged 中文 Wiki
          site_description: Runeforged 中文玩家 Wiki、机制说明与完整数据参考
          nav_translations:
            Home: 首页
            Getting Started: 基础信息
            Installation & Compatibility: 安装与兼容性
            Frequently Asked Questions: 常见问题
            Quick Start: 快速上手
            Reading Route: 阅读路线
            Weapons & Skills: 武器与战技
            World & Combat: 世界与战斗
            Equipment Forging: 装备锻造
            Special Weapon Systems: 特殊武器系统
            Curses & Infusion: 诅咒与灌注
            Legendary & Celestial Forging: 传说与天界锻造
            Equipment: 装备系统
            Equipment Quality & Affixes: 品质与词条
            Equipment Currency: 装备通货
            Equipment Material Upgrade: 装备材质升阶
            Infusion: 灌注系统
            Cursed Equipment: 诅咒系统
            Weapon Transmutation: 武器质变
            Special Weapon Variants: 特殊武器变体
            Rune-Cursed Weapons: 符文诅咒武器
            Alien Gem: 异化宝石
            Dropped Equipment Protection: 装备掉落保护
            Combat & Monsters: 战斗与怪物
            Damage Calculation: 伤害结算
            Elements, Resistances & Status Effects: 元素、抗性与状态
            Weapon Skills & Offhand Attacks: 武器战技与副手攻击
            Monster Levels: 怪物等级
            Elite Monsters: 精英怪
            Obtaining & Exploration: 获取与探索
            Monster Drops: 怪物掉落
            Chests & Trades: 宝箱与交易
            Fishing: 钓鱼
            Data Tables: 数据库
            Overview: 数据说明
            Weapon Affixes: 全武器词条表
            Armor Affixes: 全护甲词条表
            Equipment Currency Reference: 装备通货速查
            Player Commands: 玩家指令
            Default Configuration: 默认配置

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation & Compatibility: getting-started/installation.md
      - Quick Start:
          - Reading Route: getting-started/quick-start/index.md
          - Weapons & Skills: getting-started/quick-start/weapons.md
          - World & Combat: getting-started/quick-start/world-and-combat.md
          - Equipment Forging: getting-started/quick-start/equipment-forging.md
          - Special Weapon Systems: getting-started/quick-start/special-weapons.md
          - Curses & Infusion: getting-started/quick-start/curses-and-infusion.md
          - Legendary & Celestial Forging: getting-started/quick-start/legendary-and-celestial.md
      - Frequently Asked Questions: getting-started/faq.md
  - Equipment:
      - Equipment Quality & Affixes: equipment/quality-and-affixes.md
      - Equipment Currency: equipment/currency-workflow.md
      - Equipment Material Upgrade: equipment/material-upgrade.md
      - Infusion: equipment/infusion.md
      - Cursed Equipment: equipment/curses.md
      - Weapon Transmutation: equipment/weapon-transmutation.md
      - Special Weapon Variants: equipment/special-weapon-variants.md
      - Rune-Cursed Weapons: equipment/rune-cursed-weapons.md
      - Alien Gem: equipment/alien-orb.md
      - Dropped Equipment Protection: equipment/drop-protection.md
  - Combat & Monsters:
      - Damage Calculation: combat/damage-pipeline.md
      - Elements, Resistances & Status Effects: combat/elements-and-resistances.md
      - Weapon Skills & Offhand Attacks: combat/weapon-skills-and-offhand.md
      - Monster Levels: monsters/monster-levels.md
      - Elite Monsters: monsters/elites.md
  - Obtaining & Exploration:
      - Monster Drops: obtaining/monster-drops.md
      - Chests & Trades: obtaining/chests-and-trades.md
      - Fishing: obtaining/fishing.md
  - Data Tables:
      - Overview: reference/index.md
      - Weapon Affixes: reference/weapon-affixes.md
      - Armor Affixes: reference/armor-affixes.md
      - Equipment Currency Reference: reference/currencies.md
      - Player Commands: reference/commands.md
      - Default Configuration: reference/default-config.md
